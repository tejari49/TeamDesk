name: Build APK (AGP 9.0.1 - Final Solution)

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove Old gradle.properties Files
        run: |
          echo "🧹 Removing gradle.properties from repository root..."
          git rm -f gradle.properties || true
          rm -f ./gradle.properties
          echo "✅ Done"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Extract PlanWise.zip Only
        run: |
          echo "📦 Extracting PlanWise.zip..."
          
          # Verify file exists
          if [ ! -f "PlanWise.zip" ]; then
            echo "❌ ERROR: PlanWise.zip not found in repo root"
            ls -la
            exit 1
          fi
          
          # Extract with overwrite
          unzip -o -q PlanWise.zip
          
          # Verify extraction
          if [ ! -d "PlanWise" ]; then
            echo "❌ ERROR: PlanWise directory not created after unzip"
            exit 1
          fi
          
          echo "✅ PlanWise extracted successfully"
          ls -la PlanWise/

      - name: Verify gradle.properties is Perfect
        run: |
          echo "🔍 Checking PlanWise/gradle.properties..."
          
          if [ ! -f "PlanWise/gradle.properties" ]; then
            echo "❌ ERROR: PlanWise/gradle.properties does not exist!"
            exit 1
          fi
          
          echo "📄 Content:"
          cat PlanWise/gradle.properties
          
          echo ""
          echo "🔍 Verification:"
          
          # Check for correct JVM args
          if grep -q "Xmx4g" PlanWise/gradle.properties; then
            echo "✅ Has -Xmx4g"
          else
            echo "❌ Missing -Xmx4g"
            exit 1
          fi
          
          # Check for no old memory settings
          if grep -q "Xmx64m\|Xmx1g\|Xmx2g" PlanWise/gradle.properties; then
            echo "❌ Old memory settings found!"
            exit 1
          else
            echo "✅ No old memory settings"
          fi
          
          # Check for required Android settings
          if grep -q "android.useAndroidX=true" PlanWise/gradle.properties; then
            echo "✅ Has android.useAndroidX=true"
          else
            echo "❌ Missing android.useAndroidX=true"
            exit 1
          fi

      - name: Make Gradle Wrapper Executable
        run: |
          chmod +x PlanWise/gradlew
          ls -lh PlanWise/gradlew
          echo "✅ Gradle wrapper executable"

      - name: Test Gradle Wrapper
        run: |
          cd PlanWise
          ./gradlew --version 2>&1 | head -5
          echo "✅ Gradle wrapper works"

      - name: Delete Gradle Cache (Fresh Start)
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          echo "✅ Gradle cache cleaned"

      - name: Build Debug APK
        run: |
          cd PlanWise
          ./gradlew clean assembleDebug

      - name: Build Release APK
        run: |
          cd PlanWise
          ./gradlew assembleRelease

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: planwise-debug-apk
          path: PlanWise/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: planwise-release-apk
          path: PlanWise/app/build/outputs/apk/release/*.apk
