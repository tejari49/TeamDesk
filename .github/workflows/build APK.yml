name: Build APK from PlanWise.zip

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Install unzip (if missing)
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Unzip PlanWise.zip
        run: |
          test -f "PlanWise.zip" || (echo "ERROR: PlanWise.zip not found in repo root" && exit 1)
          unzip -q PlanWise.zip
          test -d "PlanWise" || (echo "ERROR: Expected folder 'PlanWise' after unzip" && exit 1)

      - name: Grant execute permission to gradlew
        run: |
          chmod +x PlanWise/gradlew

      - name: Build Debug APK
        working-directory: PlanWise
        run: |
          ./gradlew --no-daemon clean assembleDebug

      - name: Build Release APK (unsigned)
        working-directory: PlanWise
        run: |
          ./gradlew --no-daemon assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: planwise-apks
          path: |
            PlanWise/app/build/outputs/apk/debug/*.apk
            PlanWise/app/build/outputs/apk/release/*.apk
