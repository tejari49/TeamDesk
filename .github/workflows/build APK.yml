name: Build APK from PlanWise.zip (AGP9 built-in Kotlin migration)

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages (compileSdk 36)
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Unzip PlanWise.zip
        run: |
          test -f "PlanWise.zip" || (echo "ERROR: PlanWise.zip not found in repo root" && exit 1)
          unzip -q PlanWise.zip
          test -d "PlanWise" || (echo "ERROR: Expected folder 'PlanWise' after unzip" && exit 1)

      # --- PATCH: migrate to built-in Kotlin (AGP 9) + legacy-kapt ---
      - name: Patch project for AGP9 built-in Kotlin (CI)
        run: |
          set -e

          # 1) Ensure AGP version is resolvable
          sed -i 's/^agp = ".*"/agp = "9.0.1"/' PlanWise/gradle/libs.versions.toml

          # 2) Version catalog: remove kotlin-android + kotlin-kapt, add legacy-kapt
          sed -i '/^kotlin-android = /d' PlanWise/gradle/libs.versions.toml
          sed -i '/^kotlin-kapt = /d' PlanWise/gradle/libs.versions.toml
          if ! grep -q '^legacy-kapt = ' PlanWise/gradle/libs.versions.toml; then
            awk '
              BEGIN {added=0}
              /^\[plugins\]/ {
                print
                print "legacy-kapt = { id = \"com.android.legacy-kapt\", version.ref = \"agp\" }"
                added=1
                next
              }
              {print}
            ' PlanWise/gradle/libs.versions.toml > /tmp/toml && mv /tmp/toml PlanWise/gradle/libs.versions.toml
          fi

          # 3) gradle.properties: enable built-in Kotlin, remove opt-out flags
          sed -i '/^android\.builtInKotlin=/d' PlanWise/gradle.properties
          sed -i '/^android\.newDsl=/d' PlanWise/gradle.properties
          echo "android.builtInKotlin=true" >> PlanWise/gradle.properties

          # 4) Top-level build.gradle.kts: remove kotlin.android + kotlin.kapt, add legacy.kapt apply false
          sed -i '/alias(libs\.plugins\.kotlin\.android) apply false/d' PlanWise/build.gradle.kts
          sed -i '/alias(libs\.plugins\.kotlin\.kapt) apply false/d' PlanWise/build.gradle.kts
          if ! grep -q 'libs\.plugins\.legacy\.kapt' PlanWise/build.gradle.kts; then
            sed -i '/alias(libs\.plugins\.android\.application) apply false/a\    alias(libs.plugins.legacy.kapt) apply false' PlanWise/build.gradle.kts
          fi

          # 5) Module app/build.gradle.kts:
          #    - remove kotlin.android + kotlin.kapt
          #    - add legacy.kapt
          #    - remove kotlinOptions { ... } (deprecated under built-in Kotlin)
          #    - remove kapt { ... } block (optional)
          sed -i '/alias(libs\.plugins\.kotlin\.android)/d' PlanWise/app/build.gradle.kts
          sed -i '/alias(libs\.plugins\.kotlin\.kapt)/d' PlanWise/app/build.gradle.kts

          if ! grep -q 'alias(libs\.plugins\.legacy\.kapt)' PlanWise/app/build.gradle.kts; then
            sed -i '/alias(libs\.plugins\.android\.application)/a\    alias(libs.plugins.legacy.kapt)' PlanWise/app/build.gradle.kts
          fi

          # remove kotlinOptions block inside android { }
          sed -i '/kotlinOptions[[:space:]]*{/,/^[[:space:]]*}/d' PlanWise/app/build.gradle.kts

          # remove simple kapt { ... } block if present
          sed -i '/^kapt[[:space:]]*{/,/^}/d' PlanWise/app/build.gradle.kts

          echo "=== Patched versions.toml (agp + legacy-kapt) ==="
          grep -n '^agp = ' PlanWise/gradle/libs.versions.toml || true
          grep -n '^legacy-kapt = ' PlanWise/gradle/libs.versions.toml || true
          echo "=== Patched gradle.properties tail ==="
          tail -n 20 PlanWise/gradle.properties

      - name: Download Gradle 9.3.1
        run: |
          curl -fsSL "https://services.gradle.org/distributions/gradle-9.3.1-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d "$HOME/gradle"
          chmod +x "$HOME/gradle/gradle-9.3.1/bin/gradle"
          "$HOME/gradle/gradle-9.3.1/bin/gradle" --version

      - name: Build Debug APK
        run: |
          "$HOME/gradle/gradle-9.3.1/bin/gradle" --no-daemon -p PlanWise clean assembleDebug

      - name: Build Release APK (unsigned)
        run: |
          "$HOME/gradle/gradle-9.3.1/bin/gradle" --no-daemon -p PlanWise assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: planwise-apks
          path: |
            PlanWise/app/build/outputs/apk/debug/*.apk
            PlanWise/app/build/outputs/apk/release/*.apk
