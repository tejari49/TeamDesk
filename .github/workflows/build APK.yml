name: Build APK from PlanWise.zip

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Unzip PlanWise.zip
        run: |
          test -f "PlanWise.zip" || (echo "ERROR: PlanWise.zip not found in repo root" && exit 1)
          unzip -q PlanWise.zip
          test -d "PlanWise" || (echo "ERROR: Expected folder 'PlanWise' after unzip" && exit 1)

      - name: Fix gradlew script + permissions
        run: |
          chmod +x PlanWise/gradlew
          # Fix broken DEFAULT_JVM_OPTS line (prevents "-Xmx64m" being treated as main class)
          sed -i 's/^DEFAULT_JVM_OPTS=.*/DEFAULT_JVM_OPTS="-Xmx64m -Xms64m"/' PlanWise/gradlew
          grep -n 'DEFAULT_JVM_OPTS' PlanWise/gradlew || true

      - name: Pre-download Gradle distribution (forces unzip)
        working-directory: PlanWise
        run: |
          ./gradlew --no-daemon --version || true

      - name: Fix Gradle distribution execute permissions (CI)
        run: |
          find "$HOME/.gradle/wrapper/dists" -type f -path "*/bin/gradle" -exec chmod +x {} \; || true

      - name: Build Debug APK
        working-directory: PlanWise
        run: |
          ./gradlew --no-daemon clean assembleDebug

      - name: Build Release APK (unsigned)
        working-directory: PlanWise
        run: |
          ./gradlew --no-daemon assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: planwise-apks
          path: |
            PlanWise/app/build/outputs/apk/debug/*.apk
            PlanWise/app/build/outputs/apk/release/*.apk
