name: Build PlanWise APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    # Keep Gradle caches inside the workspace (safe permissions on GitHub runners)
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Packages (compileSdk 36)
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Extract PlanWise.zip
        run: |
          if [ ! -f "PlanWise.zip" ]; then
            echo "❌ PlanWise.zip not found in repo root"
            ls -la
            exit 1
          fi

          unzip -o -q PlanWise.zip

          if [ ! -d "PlanWise" ]; then
            echo "❌ PlanWise folder not found after unzip"
            ls -la
            exit 1
          fi

          chmod +x PlanWise/gradlew
          echo "✅ Extracted + gradlew executable"

      - name: Sanity (Gradle Wrapper)
        working-directory: PlanWise
        run: ./gradlew --version

      - name: Build Debug APK
        working-directory: PlanWise
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Build Release APK
        working-directory: PlanWise
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: planwise-debug-apk
          path: PlanWise/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: planwise-release-apk
          path: PlanWise/app/build/outputs/apk/release/*.apk
