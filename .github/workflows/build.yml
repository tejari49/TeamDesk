name: Build APK from PlanWise (AGP 9.0.1 - Stable)

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Extract PlanWise.zip
        run: |
          if [ ! -f "PlanWise.zip" ]; then
            echo "ERROR: PlanWise.zip not found!"
            exit 1
          fi
          unzip -o -q PlanWise.zip
          if [ ! -d "PlanWise" ]; then
            echo "ERROR: PlanWise directory not created after unzip!"
            exit 1
          fi
          echo "✅ PlanWise extracted successfully"
          ls -la PlanWise/

      - name: Make Gradle Wrapper Executable
        run: |
          chmod +x ./PlanWise/gradlew
          ls -lh ./PlanWise/gradlew

      - name: Build Debug APK
        run: |
          cd PlanWise
          ./gradlew clean assembleDebug

      - name: Build Release APK
        run: |
          cd PlanWise
          ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: planwise-debug-apk
          path: PlanWise/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: planwise-release-apk
          path: PlanWise/app/build/outputs/apk/release/*.apk
