name: Unzip PlanWise.zip into repo root

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path to zip in repo (default: PlanWise.zip)"
        required: false
        default: "PlanWise.zip"

jobs:
  unzip-to-root:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push commits

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Unzip ZIP to temp
        run: |
          ZIP_PATH="${{ inputs.zip_path }}"
          test -f "$ZIP_PATH" || (echo "ERROR: $ZIP_PATH not found" && exit 1)
          mkdir -p /tmp/planwise_unzip
          unzip -q "$ZIP_PATH" -d /tmp/planwise_unzip
          echo "Unzipped to /tmp/planwise_unzip"
          ls -la /tmp/planwise_unzip

      - name: Detect project folder
        id: detect
        run: |
          # Expect the zip to contain a top-level folder "PlanWise/"
          if [ -d "/tmp/planwise_unzip/PlanWise" ]; then
            echo "project_dir=/tmp/planwise_unzip/PlanWise" >> $GITHUB_OUTPUT
          else
            # fallback: if zip has files directly at root
            echo "project_dir=/tmp/planwise_unzip" >> $GITHUB_OUTPUT
          fi
          echo "Using project_dir=$(cat $GITHUB_OUTPUT | sed -n 's/^project_dir=//p')"

      - name: Copy project contents into repo root
        run: |
          SRC="${{ steps.detect.outputs.project_dir }}/"
          echo "Copying from $SRC to repo root..."
          # Copy everything from SRC into repo root, excluding .git
          rsync -av --delete \
            --exclude ".git/" \
            "$SRC" "./"

      - name: Remove ZIP after expand (optional)
        run: |
          ZIP_PATH="${{ inputs.zip_path }}"
          rm -f "$ZIP_PATH" || true

      - name: Git status
        run: |
          git status --porcelain

      - name: Commit & push changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Unzip project into repo root"
          git push
